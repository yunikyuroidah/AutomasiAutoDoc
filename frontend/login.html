<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Portal | AutoDoc Demo</title>
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <main class="login-layout">
      <div class="login-pattern pattern-one" aria-hidden="true"></div>
      <div class="login-pattern pattern-two" aria-hidden="true"></div>

      <section class="login-art">
        <div class="halo halo-one"></div>
        <div class="halo halo-two"></div>
        <figure>
          <img
            src="../assets/logo.png"
            alt="Logo Portal AutoDoc"
            class="login-logo"
          />
          <figcaption>Lingkungan Uji Internal · Data Fiktif</figcaption>
        </figure>
        <p class="login-tagline">
          Workspace internal untuk mengelola dokumen otomatis, validasi input, dan ekspor arsip secara terstruktur.
        </p>
      </section>

      <section class="login-card">
        <div class="floating-chip">Portal Internal</div>
        <header class="card-heading">
          <p>Selamat datang kembali</p>
          <h1>Masuk Workspace Demo</h1>
        </header>
        <div class="login-alert" role="alert" hidden></div>
        <form class="login-form" action="../backend/login.php" method="POST">
          <label class="field">
            <span>Username</span>
            <input
              type="text"
              name="username"
              placeholder="user_demo"
              autocomplete="username"
              required
            />
          </label>
          <label class="field password-field">
            <span>Password</span>
            <div class="password-input">
              <input
                type="password"
                id="password-input"
                name="password"
                placeholder="********"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="toggle-password"
                data-state="hidden"
                aria-label="Tampilkan kata sandi"
                aria-pressed="false"
              >
                <svg class="icon-eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5c-4.5 0-8.4 2.9-10 7 1.6 4.1 5.5 7 10 7s8.4-2.9 10-7c-1.6-4.1-5.5-7-10-7zm0 11.4A4.4 4.4 0 1 1 12 8.6a4.4 4.4 0 0 1 0 7.8z"
                    fill="currentColor"
                  />
                  <circle cx="12" cy="12" r="2.25" fill="currentColor"></circle>
                </svg>
                <svg class="icon-eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M3.2 4.4 2 5.6l3 3a13 13 0 0 0-3 3.4c1.9 3.3 5.5 5.6 10 5.6 1.5 0 2.9-.3 4.2-.8l3.6 3.6 1.2-1.2zM12 15.4a3.4 3.4 0 0 1-3.4-3.4c0-.4.1-.8.2-1.2l4.4 4.4c-.4.2-.8.2-1.2.2zm9.6-4.4c-.9-1.7-2.3-3.2-4-4.2l2.4-2.4-1.2-1.2-2.8 2.8A11.8 11.8 0 0 0 12 5c-1.3 0-2.6.2-3.7.6l1.6 1.6c.6-.1 1.3-.2 2.1-.2 4.5 0 8.4 2.3 10 5.6-.5 1-1.2 1.9-2 2.7l1.1 1.2c1.1-1 2-2.3 2.5-3.9z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </div>
          </label>
          <div class="form-consent">
            <input type="checkbox" id="remember" name="remember" required />
            <label class="remember" for="remember">Tetap masuk</label>
            <button type="submit" class="cta-button">Masuk Workspace</button>
          </div>
        </form>
        <p class="footnote">
          Akses terbatas untuk pengujian. Gunakan akun dummy yang tersedia di basis data contoh.
        </p>
      </section>
    </main>
    <script>
      const alertBox = document.querySelector('.login-alert');
      if (alertBox) {
        const params = new URLSearchParams(window.location.search);
        const errorType = params.get('error');
        const messages = {
          invalid: 'Kredensial tidak cocok. Periksa username dan password.',
          server: 'Sistem sedang tidak tersedia. Coba ulang beberapa saat lagi.',
          blocked:
            'Perangkat ini diblokir selama tiga hari karena percobaan masuk yang berulang. Hubungi admin bila butuh akses segera.',
          confirm: 'Centang opsi "Tetap Masuk" sebelum melanjutkan.',
        };

        if (errorType && messages[errorType]) {
          alertBox.hidden = false;
          alertBox.classList.add('is-visible');
          alertBox.textContent = messages[errorType];
        }
      }

      const passwordInput = document.getElementById('password-input');
      const togglePasswordBtn = document.querySelector('.toggle-password');

      if (passwordInput && togglePasswordBtn) {
        const setVisibility = (visible) => {
          passwordInput.type = visible ? 'text' : 'password';
          togglePasswordBtn.dataset.state = visible ? 'visible' : 'hidden';
          togglePasswordBtn.setAttribute(
            'aria-label',
            visible ? 'Sembunyikan kata sandi' : 'Tampilkan kata sandi'
          );
          togglePasswordBtn.setAttribute('aria-pressed', String(visible));
        };

        togglePasswordBtn.addEventListener('click', () => {
          const willShow = togglePasswordBtn.dataset.state !== 'visible';
          setVisibility(willShow);
        });
      }
    </script>
  </body>
</html>
